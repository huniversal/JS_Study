<!doctype html>
<html lang="ko">

    <meta charset="UTF-8" />

    <title>쇼핑목록</title>

  <script>
    // HTML 문서 로딩 완료(DOM 객체 생성 완료) 후에 발생하는 이벤트
    document.addEventListener("DOMContentLoaded", function () {
      // 이벤트 등록 방법 1. : elem.on<event> 속성에 이벤트 핸들러 추가
      btn1.onclick = function () {
        const movies = document.querySelector("#movies");

        // 첫번째 버튼 찾기
        const btn1 = document.querySelector("div > button");
        const btn2 = btn1.nextElementSibling;
        const btn3 = btn2.nextElementSibling;
      };
    });

    // 마지막에 우유 추가
    function addMilk() {
      console.log("으유!!");
      const shoppingList = document.getElementById("purchases");
      console.log(shoppingList.innerHTML);
    }
  </script>

  <body>
    <h1>쇼핑 목록</h1>
    <div>
      <button id="movies">두번째 영화 찾기</button>
      <!-- 이벤트 등록 방법 2 : HTML 요소의 on<event> 속성의 값으로 이벤트 발생시 실행할 코드를 등록 -->
      <button onclick="addMilk(); console.log('어유 진짜!!!');">

      <li>계란</li>
      <li>라면</li>
    </ul>

    <p>보고싶은 영화 목록</p>
    <ul id="movies" class="list">
      <li>어벤져스</li>
      <li>다크나이트</li>
