      // 한건의 todo 객체를 받아서 DOM 객체로 만들어 반환하는 기능
      function getTodoItemElem(item) {
        const liElem = document.createElement("li"); // li
        const noElem = document.createElement("span"); // span
        const titleElem = document.createElement("span"); // span
        const deleteElem = document.createElement("button"); // btn

        const noTxt = document.createTextNode(item.no);
        const titleTxt = document.createTextNode(item.title);
        const deleteTxt = document.createTextNode("삭제");

        noElem.appendChild(noTxt); //<span>3</span>
        titleElem.appendChild(titleTxt); //<span>샘플</span>
        deleteElem.setAttribute("type", "button");
        deleteElem.appendChild(deleteTxt);

        liElem.appendChild(noElem);
        liElem.appendChild(titleElem);
        liElem.appendChild(deleteElem);

        return liElem;
      }

      // 추가 버튼 클릭 이벤트 핸들러
      function handleAdd() {
        const inputElem = document.querySelector(".todoinput > input");
        addItem(inputElem.value); // <input>, <select> 같은 폼의 입력 요소에는 value 속성으로 사용자가 입력/선택한 값이 저장되어 있음
      }
      // 할 일 추가
      function addItem(title) {
        const item = {
          no: todoList.length + 1,
          // title: "테스트입니다.", // 속성값을 담는 변수가 속성명과 일치할 경우 속성값 생략 가능
          title,
          done: false, // 미완료 상태
        };
        const todoLi = getTodoItemElem(item);
        console.log(todoLi);
        const todoList = document.querySelector(".todolist");
        todoList.appendChild(todoLi);
      }
